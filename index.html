<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RP2040 LED Config</title>
  <link rel="icon" href="data:,">
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; max-width: 520px; }
    h1 { font-size: 1.4rem; margin-bottom: 0.4rem; }
    p { margin: 0.2rem 0 0.8rem 0; }
    .row { margin: 0.9rem 0; }
    label { font-weight: 600; display: block; margin-bottom: 0.3rem; }
    input[type=range] { width: 100%; }
    .value { font-family: monospace; margin-left: 0.4rem; }
    .preview {
      width: 100%; height: 40px; border-radius: 4px;
      border: 1px solid #ccc; margin-top: 0.5rem;
    }
    button { padding: 0.4rem 0.9rem; margin-right: 0.5rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-top: 1rem; font-size: 0.9rem; color: #444; white-space: pre-line; }
    small { color: #666; }
  </style>
</head>
<body>

  <h1>RP2040 LED Config</h1>
  <p>
    1. Click <strong>Load CONFIG.TXT</strong> and select the file from this USB drive.<br>
    2. Adjust the sliders.<br>
    3. Click <strong>Save CONFIG.TXT</strong> and overwrite the file on the drive.
  </p>

  <div class="row">
    <input id="fileInput" type="file" accept=".txt" style="display:none">
    <button id="loadBtn">Load CONFIG.TXT</button>
    <button id="saveBtn" disabled>Save CONFIG.TXT</button>
  </div>

  <div class="row">
    <label>Red <span id="rVal" class="value">0</span></label>
    <input id="r" type="range" min="0" max="255" value="0">
  </div>

  <div class="row">
    <label>Green <span id="gVal" class="value">32</span></label>
    <input id="g" type="range" min="0" max="255" value="32">
  </div>

  <div class="row">
    <label>Blue <span id="bVal" class="value">0</span></label>
    <input id="b" type="range" min="0" max="255" value="0">
  </div>

  <div class="row">
    <div id="preview" class="preview"></div>
  </div>

  <div id="status">Waiting for CONFIG.TXT…</div>
  <div class="row">
    <small>After saving, safely eject the drive or reset the device to apply settings.</small>
  </div>

  <script>
    const loadBtn   = document.getElementById('loadBtn');
    const saveBtn   = document.getElementById('saveBtn');
    const fileInput = document.getElementById('fileInput');

    const r     = document.getElementById('r');
    const g     = document.getElementById('g');
    const b     = document.getElementById('b');
    const rVal  = document.getElementById('rVal');
    const gVal  = document.getElementById('gVal');
    const bVal  = document.getElementById('bVal');
    const preview = document.getElementById('preview');
    const statusEl = document.getElementById('status');

    let hasLoadedConfig = false;

    const HEADER =
      "# RP2040 LED Configuration\r\n" +
      "# Edit the JSON below. Keep the structure intact.\r\n" +
      "# Settings will be applied on next boot.\r\n\r\n";

    function updatePreview() {
      rVal.textContent = r.value;
      gVal.textContent = g.value;
      bVal.textContent = b.value;
      preview.style.backgroundColor = `rgb(${r.value},${g.value},${b.value})`;
    }

    r.addEventListener('input', updatePreview);
    g.addEventListener('input', updatePreview);
    b.addEventListener('input', updatePreview);
    updatePreview();

    function extractJson(text) {
      const idx = text.indexOf('{');
      return idx >= 0 ? text.slice(idx) : null;
    }

    function buildConfigText() {
      const obj = {
        version: 1,
        led: {
          r: Number(r.value),
          g: Number(g.value),
          b: Number(b.value)
        }
      };
      return HEADER + JSON.stringify(obj, null, 2) + "\r\n";
    }

    loadBtn.addEventListener('click', () => {
      fileInput.value = "";
      fileInput.click();
    });

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const jsonText = extractJson(text);

        let data = { version: 1, led: { r: 0, g: 32, b: 0 } };
        if (jsonText) {
          try { data = JSON.parse(jsonText); } catch (e) {}
        }

        r.value = data.led.r ?? 0;
        g.value = data.led.g ?? 32;
        b.value = data.led.b ?? 0;
        updatePreview();

        hasLoadedConfig = true;
        saveBtn.disabled = false;
        statusEl.textContent = "Loaded CONFIG.TXT. Adjust sliders and click Save.";
      } catch (e) {
        statusEl.textContent = "Failed to read CONFIG.TXT.";
      }
    });

    saveBtn.addEventListener('click', () => {
      if (!hasLoadedConfig) return;

      const content = buildConfigText();
      const blob = new Blob([content], { type: "text/plain" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "CONFIG.TXT";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      statusEl.textContent =
        "Downloaded CONFIG.TXT.\nReplace the file on the USB drive with this one to apply changes.";
    });
  </script>

</body>
</html>
